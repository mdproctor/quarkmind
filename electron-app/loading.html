<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QuarkMind</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14;
    color: #c0c8e0;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }
  h1 {
    font-size: 28px;
    color: #4488ff;
    letter-spacing: 6px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 12px;
    color: #556;
    letter-spacing: 3px;
    margin-bottom: 48px;
  }
  .bar-wrap {
    width: 260px;
    height: 4px;
    background: #1a1a2e;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .bar {
    height: 100%;
    background: linear-gradient(90deg, #1a6fd4, #4488ff);
    border-radius: 2px;
    width: 0%;
    animation: fill 18s ease-out forwards;
  }
  @keyframes fill { to { width: 90%; } }
  #status {
    font-size: 11px;
    color: #446;
    letter-spacing: 1px;
  }
  .dot { animation: blink 1s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
</style>
</head>
<body>
  <h1>QuarkMind</h1>
  <div class="subtitle">SC2 REPLAY VIEWER</div>
  <div class="bar-wrap"><div class="bar"></div></div>
  <div id="status">
    Starting server<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>
  <script>
    window.electronAPI?.onStatus(msg => {
      document.getElementById('status').textContent = msg;
    });
  </script>
</body>
</html>
