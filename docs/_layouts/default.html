<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != 'Home' %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>

  <nav class="site-nav">
    <a class="nav-logo" href="{{ '/' | relative_url }}">
      Quark<span>Mind</span>
    </a>
    <div class="nav-links">
      <a href="{{ '/blog/' | relative_url }}" class="nav-link{% if page.layout == 'post' or page.url contains '/blog/' %} active{% endif %}">Diary</a>
      <a href="https://github.com/mdproctor/quarkmind" class="nav-link" target="_blank" rel="noopener">GitHub &#x2197;</a>
    </div>
  </nav>

  {{ content }}

  <footer class="site-footer">
    <span>QuarkMind — SC2 agent platform</span>
    <div class="footer-links">
      <a href="{{ '/blog/' | relative_url }}">Diary</a>
      <a href="https://github.com/mdproctor/quarkmind" target="_blank" rel="noopener">GitHub</a>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/properties.min.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el)));</script>
</body>
</html>
